        <h1>Monte Carlo</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>2¼ oz rye</li>
            <li>½ oz Bénédictine</li>
            <li>2 dashes Angostura bitters</li>
            <li>Lemon peel, for garnish</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Stir with ice over a big cube.</li>
            <li>Garnish with a lemon peel.</li>
        </ol>
