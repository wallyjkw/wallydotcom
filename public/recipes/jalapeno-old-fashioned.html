        <h1>Jalapeño Old Fashioned</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>2 oz bourbon</li>
            <li>¼ oz jalapeño syrup</li>
            <li>2–3 dashes Angostura bitters</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Add all ingredients to a glass with ice.</li>
            <li>Stir.</li>
        </ol>
    </main>
