        <h1>Southern Baptist</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>2 oz rye</li>
            <li>~⅓ oz ginger syrup</li>
            <li>½ oz lime juice</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Add all ingredients to a shaker with ice.</li>
            <li>Shake, then strain into a coupe.</li>
        </ol>

        <h2>Notes</h2>
        <ul>
            <li>Rating: B.</li>
        </ul>
