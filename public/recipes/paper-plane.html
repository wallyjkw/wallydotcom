<body>
    <main class="card">

        <div class="wordmark">WallyDotCom</div>
        <h1>Paper Plane</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>¾ oz bourbon</li>
            <li>¾ oz Aperol</li>
            <li>¾ oz Amaro Nonino</li>
            <li>¾ oz lemon juice</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Add all ingredients to a shaker with ice and shake.</li>
            <li>Strain into a coupe.</li>
        </ol>

        <h2>Notes</h2>
        <ul>
            <li>Equal parts all around. Also goes by "Paper Airplane."</li>
        </ul>
    </main>
