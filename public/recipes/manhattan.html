<body>
    <main class="card">
        <a class="backlink" href="/cocktails">&larr; Back to Cocktails</a>

        <div class="wordmark">WallyDotCom</div>
        <h1>Manhattan</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>2 oz rye</li>
            <li>1 oz sweet vermouth</li>
            <li>2 dashes Angostura bitters</li>
            <li>Cherry, for garnish</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Stir with ice to chill.</li>
            <li>Strain into a glass.</li>
            <li>Garnish with a cherry.</li>
        </ol>
    </main>
</body>
