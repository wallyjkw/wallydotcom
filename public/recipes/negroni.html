<body>
    <main class="card">
        <a class="backlink" href="/cocktails">&larr; Back to Cocktails</a>

        <div class="wordmark">WallyDotCom</div>
        <h1>Negroni</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>1 oz gin</li>
            <li>1 oz Campari</li>
            <li>1 oz sweet vermouth</li>
            <li>Orange peel, for garnish</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Add all ingredients to a glass over a large ice cube.</li>
            <li>Stir until cold.</li>
            <li>Garnish with an orange peel.</li>
        </ol>
    </main>
