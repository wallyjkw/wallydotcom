        <h1>Horsefeather</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>2 oz rye</li>
            <li>½ oz lemon juice</li>
            <li>¼ oz simple syrup</li>
            <li>3 oz ginger beer</li>
            <li>2 dashes Angostura bitters</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Build in a glass with ice.</li>
            <li>Stir.</li>
        </ol>
