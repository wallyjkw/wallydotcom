<body>
    <main class="card">

        <div class="wordmark">WallyDotCom</div>
        <h1>Gold Rush</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>2 oz bourbon</li>
            <li>¾ oz lemon juice</li>
            <li>¾ oz honey syrup</li>
            <li>Grapefruit peel, for garnish</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Add the bourbon, lemon, honey syrup, and grapefruit peel to a shaker with ice.</li>
            <li>Shake, then strain over fresh ice.</li>
        </ol>
    </main>
