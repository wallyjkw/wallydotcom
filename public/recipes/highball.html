        <div class="wordmark">WallyDotCom</div>
        <h1>Highball</h1>

        <h2>Ingredients</h2>
        <ul>
            <li>2 oz whiskey</li>
            <li>4 oz soda water</li>
            <li>Ice</li>
        </ul>

        <h2>Steps</h2>
        <ol>
            <li>Fill a glass with ice.</li>
            <li>Add the whiskey, then top with soda.</li>
        </ol>

        <h2>Notes</h2>
        <ul>
            <li>Rating: B.</li>
            <li>Penelope Wheated with a splash of lemon is good. Suntory Toki is good.</li>
        </ul>
    </main>
