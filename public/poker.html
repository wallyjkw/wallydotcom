<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Poker · WallyDotCom</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/poker.css">
</head>
<body>
    <main class="card poker-card">
        <a class="backlink" href="/">← Back to WallyDotCom</a>

        <div class="wordmark">WallyDotCom</div>
        <h1>Poker ♠</h1>
        <p class="intro">No Limit Texas Hold'em — you vs. the bots. Cash game, blinds never change.</p>

        <!-- Setup screen -->
        <div id="setup">
            <div class="field">
                <label for="num-players">Players at the table</label>
                <select id="num-players">
                    <option>2</option><option>3</option><option>4</option><option>5</option>
                    <option>6</option><option>7</option><option selected>8</option>
                    <option>9</option><option>10</option>
                </select>
            </div>
            <div class="field">
                <label for="start-stack">Starting stack</label>
                <input type="number" id="start-stack" value="300" min="1" step="50">
            </div>
            <div class="field-row">
                <div class="field">
                    <label for="sb">Small blind</label>
                    <input type="number" id="sb" value="1" min="1" step="1">
                </div>
                <div class="field">
                    <label for="bb">Big blind</label>
                    <input type="number" id="bb" value="2" min="1" step="1">
                </div>
            </div>
            <button id="start-game" class="poker-btn primary">Sit down ♠</button>
        </div>

        <!-- Game screen -->
        <div id="game" hidden>
            <div id="message" class="poker-message"></div>
            <div id="table"></div>

            <!-- Action bar is pinned to the bottom of the screen so the buttons
                 are always visible without scrolling, no matter where you are. -->
            <div id="action-bar">
                <div id="waiting" class="waiting" hidden>Other players are acting…</div>

                <div id="controls" class="controls" hidden>
                    <div class="action-row">
                        <button id="btn-fold" class="poker-btn">Fold</button>
                        <button id="btn-call" class="poker-btn">Check</button>
                        <button id="btn-raise" class="poker-btn primary">Raise</button>
                    </div>
                    <div class="raise-row">
                        <input type="range" id="raise-slider" min="0" max="100" value="0">
                        <span id="raise-amt"></span>
                    </div>
                    <div id="quick" class="quick">
                        <button class="poker-btn small" data-frac="0.5">½ Pot</button>
                        <button class="poker-btn small" data-frac="0.75">¾ Pot</button>
                        <button class="poker-btn small" data-frac="1">Pot</button>
                        <button class="poker-btn small" data-frac="allin">All-in</button>
                    </div>
                </div>

                <div id="after-hand" class="after-hand" hidden>
                    <button id="deal-next" class="poker-btn primary" hidden>Deal next hand</button>
                    <button id="rebuy" class="poker-btn primary" hidden>Rebuy (top up) ♻</button>
                    <button id="new-game" class="poker-btn">Leave table</button>
                </div>
            </div>
        </div>
    </main>

    <script src="/poker.js"></script>
</body>
</html>
